name: Declarative Automation Bundles  # name of the workflow
 
on: 
  workflow_dispatch: # manually run this pipeline ( workflow )
 
permissions: # permissions for actions
  contents: read # for actions/checkout
 
defaults:
  run:
    working-directory: . # default working directory for all run steps ( . root directory of repo )
jobs:
#==========================================================================
# JOB: Validate Declarative Automation Bundles
#==========================================================================  
  validate: # JOB ID
    name: Validate declarative automation bundles # JOB NAME
    runs-on: ubuntu-latest # runner used in the job
    env:
      ARM_CLIENT_ID: 2118cc40-71a3-4e53-92ca-a60f61806747     
      ARM_CLIENT_SECRET: _Nv8Q~yj2E4mv8vVjORdRtgdpPxJPuXS2vep5b1P
      ARM_TENANT_ID: 8d970696-f884-42b5-a8ea-742bf9d0d576
      DATABRICKS_HOST: https://adb-7405607349730837.17.azuredatabricks.net/  

    continue-on-error: false # if job fails, stop the workflow
    steps:
 
      # pull code from repo to runner ( )
      - name: Checkout code # pull code from repo to runner ( )
        uses: actions/checkout@v4
 
      # install databricks cli  
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
        
      - name: Ensure .py files are Databricks notebooks (ubantu-latest)
        run: |
          Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.py" -Recurse | ForEach-Object {
            ("# Databricks notebook source`n" + (Get-Content $_.FullName -Raw)) | Set-Content $_.FullName
          }
        shell: pwsh

      # validate Declarative Automation Bundles
      - name: Validate bundle
        run: databricks bundle validate -t prod
        env:
          ARM_CLIENT_ID: 2118cc40-71a3-4e53-92ca-a60f61806747     
          ARM_CLIENT_SECRET: _Nv8Q~yj2E4mv8vVjORdRtgdpPxJPuXS2vep5b1P
          ARM_TENANT_ID: 8d970696-f884-42b5-a8ea-742bf9d0d576
          DATABRICKS_HOST: https://adb-7405607349730837.17.azuredatabricks.net/   
#==========================================================================
# JOB: Deploy Declarative Automation Bundles
#==========================================================================  
  deploy: # JOB ID
    name: Deploy declarative automation bundles # JOB NAME
    if: ${{ needs.validate.result == 'success' }}
    needs: validate # this job depends on validate job
    runs-on: ubuntu-latest # runner used in the job
    continue-on-error: false # if job fails, stop the workflow
    steps:
 
      # pull code from repo to runner ( )
      - name: Checkout code # pull code from repo to runner ( )
        uses: actions/checkout@v4
 
      # install databricks cli  
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
        
      - name: Ensure .py files are Databricks notebooks (ubantu-latest)
        run: |
          Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.py" -Recurse | ForEach-Object {
            ("# Databricks notebook source`n" + (Get-Content $_.FullName -Raw)) | Set-Content $_.FullName
          }
        shell: pwsh
      # validate Declarative Automation Bundles
      - name: Deploy bundle
        run: databricks bundle deploy -t prod
        env:
          # BUNDLE_VAR_DATABRICKS_CLIENT_ID: 2118cc40-71a3-4e53-92ca-a60f61806747
          ARM_CLIENT_ID: 2118cc40-71a3-4e53-92ca-a60f61806747     
          ARM_CLIENT_SECRET: _Nv8Q~yj2E4mv8vVjORdRtgdpPxJPuXS2vep5b1P
          ARM_TENANT_ID: 8d970696-f884-42b5-a8ea-742bf9d0d576
          DATABRICKS_HOST: https://adb-7405607349730837.17.azuredatabricks.net/
